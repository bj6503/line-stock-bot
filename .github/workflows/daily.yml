name: Daily Stock Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - monitor
          - update_watchlist

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    if: inputs.mode == 'morning'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 早盤掃描
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

  monitor-scan:
    runs-on: ubuntu-latest
    if: inputs.mode == 'monitor'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 盤中監控
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

  update-watchlist:
    runs-on: ubuntu-latest
    if: inputs.mode == 'update_watchlist'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 更新股票清單
        run: python update_watchlist.py
      - name: 儲存清單
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add watchlist.json
          git diff --staged --quiet || git commit -m "update watchlist: $(date)"
          git push
