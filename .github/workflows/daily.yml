name: Daily Stock Bot

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - monitor

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'morning' || github.event_name == 'schedule' && startsWith(github.event.schedule, '30 0')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 早盤掃描
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

  monitor-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'monitor' || github.event_name == 'schedule' && !startsWith(github.event.schedule, '30 0')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 盤中監控
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py
